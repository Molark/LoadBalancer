openapi: 3.0.3
info:
  title: Room Booking Service
  description: Room Booking Service
  version: "1.0.0"

servers:
  - url: http://localhost:80

tags:
  - name: Auth
  - name: Rooms
  - name: Schedules
  - name: Slots
  - name: Bookings

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RoomIdPath:
      name: roomId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Room identifier
    BookingIdPath:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Booking identifier

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - INVALID_REQUEST
                - UNAUTHORIZED
                - NOT_FOUND
                - ROOM_NOT_FOUND
                - SLOT_NOT_FOUND
                - SLOT_ALREADY_BOOKED
                - BOOKING_NOT_FOUND
                - FORBIDDEN
                - SCHEDULE_EXISTS
                - INTERNAL_ERROR
            message:
              type: string
      example:
        error:
          code: INVALID_REQUEST
          message: invalid request

    InternalErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: INTERNAL_ERROR
            message:
              type: string
      example:
        error:
          code: INTERNAL_ERROR
          message: internal server error

    Token:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT for the Authorization Bearer header

    User:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
        createdAt:
          type: string
          format: date-time
          nullable: true

    Room:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    Schedule:
      type: object
      required: [roomId, daysOfWeek, startTime, endTime]
      properties:
        id:
          type: string
          format: uuid
        roomId:
          type: string
          format: uuid
        daysOfWeek:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          description: "1=Mon .. 7=Sun, days of availability. Each value must be in the range 1–7."
        startTime:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: Start time (HH:MM) within the day. Interpreted as UTC.
        endTime:
          type: string
          pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
          description: End time (HH:MM) within the day. Interpreted as UTC.

    Slot:
      type: object
      required: [id, roomId, start, end]
      properties:
        id:
          type: string
          format: uuid
        roomId:
          type: string
          format: uuid
        start:
          type: string
          format: date-time
          description: Slot start time in UTC (ISO 8601, e.g. 2024-06-10T09:00:00Z)
        end:
          type: string
          format: date-time
          description: Slot end time in UTC (ISO 8601, e.g. 2024-06-10T09:30:00Z)

    Booking:
      type: object
      required: [id, slotId, userId, status]
      properties:
        id:
          type: string
          format: uuid
        slotId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, cancelled]
        createdAt:
          type: string
          format: date-time
          nullable: true

    Pagination:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
          description: Current page (starting from 1)
        pageSize:
          type: integer
          description: Page size
        total:
          type: integer
          description: Total number of records

paths:
  # ──────────────────────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────────────────────

  /register:
    post:
      tags: [Auth]
      summary: "User registration"
      description: >
        Creates a new user and returns their data.
        Available without authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid request or email already taken
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  /login:
    post:
      tags: [Auth]
      summary: "Login with email and password"
      description: >
        Authenticates a user by email and password and returns a JWT.
        
        Available without authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Successful authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  /dummyLogin:
    post:
      tags: [Auth]
      summary: Get a test JWT by role. Available without authorization.
      description: >
        Issues a test JWT for the specified role (admin / user).
        For each role, a **fixed UUID** of the user is returned:
        the same UUID for all requests with the admin role and the same UUID for the user role.
        This ensures stability when testing scenarios that require owner verification.
        The JWT contain `user_id` (UUID) and `role`.
        Accepts only valid role values: `admin` or `user`; other values result in 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, user]
      responses:
        '200':
          description: Test token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Invalid request (invalid role value)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  # ──────────────────────────────────────────────────────────────
  # Rooms
  # ──────────────────────────────────────────────────────────────

  /rooms/list:
    get:
      tags: [Rooms]
      summary: List of rooms (admin and user)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: '#/components/schemas/Room'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  /rooms/create:
    post:
      tags: [Rooms]
      summary: Create a room (admin only)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                capacity:
                  type: integer
                  nullable: true
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                type: object
                properties:
                  room:
                    $ref: '#/components/schemas/Room'
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Access forbidden (admin role required)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  # ──────────────────────────────────────────────────────────────
  # Schedules
  # ──────────────────────────────────────────────────────────────

  /rooms/schedule/create:
    post:
      tags: [Schedules]
      summary: Create room schedule (admin only, once only). Slot duration is 30 minutes. Schedule cannot be changed after creation.
      description: >
        Available only for the admin role.
        A schedule can be created only once for each room.
        The `daysOfWeek` field must contain values from 1 to 7 (1=Mon, 7=Sun).
        Values outside this range return 400.
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Schedule'
      responses:
        '201':
          description: Schedule saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule:
                    $ref: '#/components/schemas/Schedule'
        '400':
          description: Invalid request (including invalid daysOfWeek values)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Access forbidden (admin role required)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Room not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: Schedule for this room already exists and cannot be changed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error:
                  code: SCHEDULE_EXISTS
                  message: schedule for this room already exists and cannot be changed
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  # ──────────────────────────────────────────────────────────────
  # Slots
  # ──────────────────────────────────────────────────────────────

  /rooms/{roomId}/slots/list:
    get:
      tags: [Slots]
      summary: List of available slots for a room on a specific date (admin and user). The most loaded endpoint.
      description: >
        Returns slots that are not occupied by an active booking for the specified room on the specified date.
        All dates and times are provided and returned in UTC.
        The `date` parameter is required; if missing, returns 400.
        If the room has no schedule — returns an empty list (room is considered always unavailable).
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/RoomIdPath'
        - name: date
          in: query
          required: true
          description: "Date in ISO 8601 format (e.g.: 2024-06-10). Required parameter; absence results in 400."
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of available slots (not occupied by active bookings). Empty list if the room has no schedule or no slots on this date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/Slot'
        '400':
          description: Invalid request (missing or incorrect date parameter)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Room not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  # ──────────────────────────────────────────────────────────────
  # Bookings
  # ──────────────────────────────────────────────────────────────

  /bookings/create:
    post:
      tags: [Bookings]
      summary: Create a booking for a slot (user only)
      description: >
        Available only for the user role. Administrators cannot create bookings (403).
        If the time slot is in the past (start < now), returns 400 (INVALID_REQUEST).
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slotId]
              properties:
                slotId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Access forbidden (booking available only for user role)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Slot not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: Slot is already booked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error:
                  code: SLOT_ALREADY_BOOKED
                  message: slot is already booked
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  /bookings/list:
    get:
      tags: [Bookings]
      summary: List of all bookings with pagination (admin only)
      description: >
        Available only for the admin role.
        Supports pagination via `page` and `pageSize` parameters.
        Both parameters are optional; defaults: `page=1`, `pageSize=20`.
        Maximum `pageSize` is 100.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          description: Page number (starting from 1). Default is 1.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Number of records per page. Default 20, maximum 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: List of all bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: Invalid request (incorrect pagination parameters)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Access forbidden (admin only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  /bookings/my:
    get:
      tags: [Bookings]
      summary: List of current user's bookings (user only)
      description: >
        Available only for the user role.
        Returns bookings of the user whose `user_id` is in the JWT token.
        Only bookings for future slots are returned (start >= now); bookings for past slots are not included.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: List of current user's bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Access forbidden (user only)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }

  /bookings/{bookingId}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel a booking (only own booking, user only)
      description: >
        Available only for the user role. A user can only cancel their own booking.
        The operation is **idempotent**: calling it again on an already cancelled booking is not an error
        and returns 200 with the current booking state (status: cancelled).
        Attempting to cancel someone else's booking returns 403.
        If no booking with the given ID exists — 404.
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/BookingIdPath'
      responses:
        '200':
          description: Booking cancelled (or was already cancelled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking:
                    $ref: '#/components/schemas/Booking'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Not own booking or not user role
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                error:
                  code: FORBIDDEN
                  message: cannot cancel another user's booking
        '404':
          description: Booking not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Internal server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternalErrorResponse' }